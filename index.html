<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raghav Realty — Owner Portal</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --red: #C0392B;
      --red-dark: #96281B;
      --black: #1A1A1A;
      --white: #FFFFFF;
      --gray-bg: #F5F5F5;
      --gray-border: #E0E0E0;
      --text-muted: #666666;
      --error-bg: #FDECEA;
    }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--gray-bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--red);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .logo-icon {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .logo-icon img {
      width: 42px;
      height: 42px;
      object-fit: contain;
      display: block;
    }
    .logo-name { color: var(--white); font-size: 20px; font-weight: 700; letter-spacing: 0.3px; }
    .logo-sub  { color: rgba(255,255,255,0.75); font-size: 11px; letter-spacing: 0.4px; text-transform: uppercase; }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
    }
    .card {
      background: var(--white);
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
    }
    .card-title { font-size: 22px; font-weight: 700; color: var(--black); margin-bottom: 6px; }
    .card-sub   { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; line-height: 1.5; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--black); margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--gray-border);
      border-radius: 6px;
      font-size: 14px;
      color: var(--black);
      background: var(--white);
      transition: border-color 0.15s;
    }
    input:focus { outline: none; border-color: var(--red); }
    input::placeholder { color: #BBBBBB; }
    .btn {
      width: 100%;
      padding: 12px;
      background: var(--red);
      color: var(--white);
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .btn:hover:not(:disabled) { background: var(--red-dark); }
    .btn:disabled { background: #CCCCCC; cursor: not-allowed; }
    .error-box {
      background: var(--error-bg);
      color: var(--red);
      border: 1px solid #F5C6C2;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }
    .divider { border: none; border-top: 1px solid var(--gray-border); margin: 28px 0; }
    .admin-link { text-align: center; font-size: 13px; color: var(--text-muted); }
    .admin-link a { color: var(--red); text-decoration: none; font-weight: 600; }
    .admin-link a:hover { text-decoration: underline; }
    footer {
      text-align: center;
      padding: 18px;
      font-size: 12px;
      color: #AAAAAA;
      border-top: 1px solid var(--gray-border);
      background: var(--white);
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-icon"><img src="logo.png" alt="Raghav Realty"></div>
    <div>
      <div class="logo-name">Raghav Realty</div>
      <div class="logo-sub">Owner Verification Portal · Nalanda</div>
    </div>
  </header>

  <main>
    <div class="card">
      <div class="card-title">Owner Login</div>
      <div class="card-sub">Enter your House ID and password to access your verification portal.</div>

      <div class="error-box" id="errorBox"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="houseId">House ID</label>
          <input type="text" id="houseId" placeholder="e.g. NAL-001" autocomplete="off" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn" id="loginBtn">Login to Portal</button>
      </form>

      <hr class="divider">
      <div class="admin-link">
        Raghav Realty staff? <a href="admin.html">Admin Panel →</a>
      </div>
    </div>
  </main>

  <footer>© 2025 Raghav Realty. Nalanda Land Registry Portal. All rights reserved.</footer>

  <script>
    if (localStorage.getItem('rr_token')) window.location.href = 'customer.html';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn    = document.getElementById('loginBtn');
      const errBox = document.getElementById('errorBox');
      errBox.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Logging in…';

      const houseId  = document.getElementById('houseId').value.trim().toUpperCase();
      const password = document.getElementById('password').value;

      if (!houseId || !password) {
        errBox.textContent = 'Please fill in all fields.';
        errBox.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Login to Portal';
        return;
      }

      try {
        const res  = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ house_id: houseId, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed. Check your credentials.');
        localStorage.setItem('rr_token', data.token);
        localStorage.setItem('rr_owner', JSON.stringify(data.owner));
        window.location.href = 'customer.html';
      } catch (err) {
        errBox.textContent = err.message;
        errBox.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Login to Portal';
      }
    });
  </script>
</body>
</html>
